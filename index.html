<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Даниил | 3D Artist Portfolio</title>
    <!-- Подключаем наш файл стилей -->
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем библиотеку для просмотра 3D моделей -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.1.1/model-viewer.min.js"></script>
    <!-- Подключаем красивый шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Данил</h1>
            <p class="subtitle">3D Environment Artist / Prop Artist</p>
            <p class="bio">Создаю высокополигональные и оптимизированные для движков (Game-Ready) модели. Работаю в Blender, ZBrush, Substance Painter.</p>
            <div class="social-links">
                <a href="https://artstation.com/badgerzx" target="_blank">ArtStation</a>
                <a href="mailto:danichkob@email.com">Email</a>
            </div>
        </div>
    </header>

    <main>
        <section class="gallery">
            <!-- Проект 1: Обычный рендер (картинка) -->
            <div class="project-card">
                <img src="assets/Spaceships1.png" alt="Spaceships scene">
                <div class="project-info">
                    <h3>Spaceships for isometric game</h3>
                    <p></p>
                </div>
            </div>

            <!-- Проект 2: Интерактивная 3D-модель -->
            <div class="project-card">
                <!-- Сюда вставляем твою модель .glb -->
                <model-viewer src="assets/Bushplane.glb" 
                              auto-rotate 
                              camera-controls 
                              shadow-intensity="1"
                              environment-image="neutral"
                              exposure="1">
                </model-viewer>
                <div class="project-info">
                    <h3>Bushplane</h3>
                    <p></p>
                </div>
            </div>

        </section>
    </main>

    <footer>
        <p>© 2026 Даниил. Создано с любовью к 3D.</p>
    </footer>

<!-- HTML для полноэкранного окна -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <div id="lightbox-content" class="lightbox-content"></div>
    </div>

    <!-- JavaScript для работы полноэкранного режима -->
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxContent = document.getElementById('lightbox-content');
        const closeBtn = document.querySelector('.close-btn');

        // Находим все картинки и 3D-модели внутри карточек
        const mediaElements = document.querySelectorAll('.project-card img, .project-card model-viewer');

        mediaElements.forEach(el => {
            el.addEventListener('click', () => {
                lightbox.classList.add('active'); // Показываем окно
                lightboxContent.innerHTML = '';   // Очищаем старое

                // Если кликнули на картинку
                if (el.tagName.toLowerCase() === 'img') {
                    const img = document.createElement('img');
                    img.src = el.src;
                    lightboxContent.appendChild(img);
                } 
                // Если кликнули на 3D модель
                else if (el.tagName.toLowerCase() === 'model-viewer') {
                    const viewer = document.createElement('model-viewer');
                    viewer.src = el.src;
                    viewer.setAttribute('auto-rotate', '');
                    viewer.setAttribute('camera-controls', '');
                    viewer.setAttribute('shadow-intensity', '1');
                    lightboxContent.appendChild(viewer);
                }
            });
        });

        // Закрытие по клику на крестик
        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('active');
            lightboxContent.innerHTML = '';
        });

        // Закрытие по клику мимо картинки/модели (по темному фону)
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
                lightboxContent.innerHTML = '';
            }
        });

        // Закрытие по нажатию клавиши Esc
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                lightboxContent.innerHTML = '';
            }
        });
    </script>
	
</body>
</html>
